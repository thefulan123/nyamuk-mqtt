{% extends "base.html" %}

{% block content %}
<div class="dashboard">
    <h2>Broker Configuration</h2>

    <div class="section">
        <h3>Current Config</h3>
        <pre id="config-content" class="code-block">Loading...</pre>
    </div>

    <div class="section">
        <h3>Broker Status</h3>
        <div class="status-grid">
            <div class="stat-card">
                <h4>Status</h4>
                <p id="broker-status" class="stat-value">Loading...</p>
            </div>
            <div class="stat-card">
                <h4>Port</h4>
                <p id="broker-port" class="stat-value">--</p>
            </div>
            <div class="stat-card">
                <h4>Created</h4>
                <p id="broker-created" class="stat-value">--</p>
            </div>
        </div>
    </div>

    <div class="section">
        <h3>Quick Actions</h3>
        <div class="button-group">
            <button id="start-btn" class="btn btn-success">Start</button>
            <button id="stop-btn" class="btn btn-danger">Stop</button>
            <button id="restart-btn" class="btn btn-warning">Restart</button>
        </div>
    </div>
</div>

<script>
async function loadStatus() {
    const response = await fetch('/api/status');
    const data = await response.json();
    const status = data.status;
    document.getElementById('broker-status').textContent =
        status.status === 'running' ? 'Running' : status.status;
    document.getElementById('broker-port').textContent = status.port || '--';
    document.getElementById('broker-created').textContent =
        status.created_at ? status.created_at.substring(0, 19) : '--';
}

async function loadLogs() {
    const response = await fetch('/api/logs');
    const data = await response.json();
    if (data.logs && data.logs.length > 0) {
        document.getElementById('config-content').textContent =
            data.logs.map(l => l.message || l.raw || '').join('\n');
    } else {
        document.getElementById('config-content').textContent = 'No logs available';
    }
}

async function brokerAction(action) {
    const response = await fetch(`/api/broker/${action}`, { method: 'POST' });
    const data = await response.json();
    alert(data.message);
    loadStatus();
}

document.getElementById('start-btn').addEventListener('click', () => brokerAction('start'));
document.getElementById('stop-btn').addEventListener('click', () => brokerAction('stop'));
document.getElementById('restart-btn').addEventListener('click', () => brokerAction('restart'));

loadStatus();
loadLogs();
setInterval(loadStatus, 5000);
</script>
{% endblock %}
