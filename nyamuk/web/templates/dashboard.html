{% extends "base.html" %}

{% block content %}
<div class="dashboard">
    <h2>Dashboard</h2>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Status</h3>
            <p id="broker-status" class="stat-value">Loading...</p>
        </div>
        <div class="stat-card">
            <h3>Uptime</h3>
            <p id="broker-uptime" class="stat-value">N/A</p>
        </div>
        <div class="stat-card">
            <h3>CPU Usage</h3>
            <p id="cpu-usage" class="stat-value">0%</p>
        </div>
        <div class="stat-card">
            <h3>Memory Usage</h3>
            <p id="memory-usage" class="stat-value">0%</p>
        </div>
    </div>

    <div class="section">
        <h3>Connected Clients</h3>
        <table class="data-table" id="clients-table">
            <thead>
                <tr>
                    <th>Client ID</th>
                    <th>Status</th>
                    <th>Connected Since</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="3" class="text-center">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="section">
        <h3>Recent Messages</h3>
        <div id="messages-log" class="log-container">
            <p class="text-muted">Waiting for messages...</p>
        </div>
    </div>
</div>

<script>
const socket = io();

socket.on('connect', function() {
    console.log('Connected to server');
    socket.emit('request_status');
});

socket.on('status_update', function(data) {
    updateDashboard(data);
});

socket.on('message_received', function(data) {
    addMessage(data);
});

function updateDashboard(data) {
    const status = data.status;
    const stats = data.stats;

    document.getElementById('broker-status').textContent =
        status.status === 'running' ? '✅ Running' : '❌ Stopped';

    document.getElementById('cpu-usage').textContent =
        stats.cpu_percent ? stats.cpu_percent + '%' : 'N/A';

    document.getElementById('memory-usage').textContent =
        stats.memory_percent ? stats.memory_percent + '%' : 'N/A';
}

function addMessage(data) {
    const log = document.getElementById('messages-log');
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<span class="log-time">${data.timestamp}</span> ` +
                     `<span class="log-topic">${data.topic}</span> ` +
                     `<span class="log-payload">${data.payload}</span>`;
    log.insertBefore(entry, log.firstChild);

    // Keep only last 50 messages
    while (log.children.length > 50) {
        log.removeChild(log.lastChild);
    }
}

// Refresh status every 5 seconds
setInterval(function() {
    socket.emit('request_status');
}, 5000);
</script>
{% endblock %}
