; PlatformIO Configuration for ESP32 Basic Template
; https://platformio.org/

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Libraries
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.0

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=4
